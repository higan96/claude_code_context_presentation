<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <!-- 外枠: コンテキストウィンドウ -->
  <rect x="50" y="30" width="500" height="320" rx="16" fill="#f7fafc" stroke="#2d3748" stroke-width="3"/>

  <!-- ラベル -->
  <text x="300" y="22" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2d3748">コンテキストウィンドウ（有限の容量）</text>

  <!-- CLAUDE.md / MCP / システム -->
  <rect x="70" y="50" width="220" height="70" rx="8" fill="#ed8936" opacity="0.85"/>
  <text x="180" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">CLAUDE.md</text>

  <rect x="310" y="50" width="220" height="70" rx="8" fill="#9f7aea" opacity="0.85"/>
  <text x="420" y="84" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">MCP・システム</text>
  <text x="420" y="102" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">指示</text>

  <!-- ファイル内容 -->
  <rect x="70" y="128" width="460" height="70" rx="8" fill="#48bb78" opacity="0.85"/>
  <text x="300" y="168" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">読み込んだファイル・コマンド出力</text>

  <!-- 会話履歴 -->
  <rect x="70" y="206" width="460" height="70" rx="8" fill="#4299e1" opacity="0.85"/>
  <text x="300" y="246" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">会話履歴（質問と応答）</text>

  <!-- 空き領域 -->
  <rect x="70" y="284" width="460" height="50" rx="8" fill="none" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="300" y="314" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a0aec0">← 残りの空き容量 →</text>

  <!-- 矢印: 上から下に向かって埋まるイメージ -->
  <text x="580" y="110" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#e53e3e">↓</text>
  <text x="580" y="200" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e53e3e">埋まる</text>
  <text x="580" y="260" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#e53e3e">↓</text>
</svg>
